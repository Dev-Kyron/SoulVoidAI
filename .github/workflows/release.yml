name: Release

# Triggered by pushing a version tag like `v0.1.1`. Each platform leg builds
# its installer + the `latest*.yml` metadata file electron-updater reads,
# then electron-builder uploads everything to a GitHub Release.
#
# The Release is created as a DRAFT (per electron-builder.yml `releaseType:
# draft`) — you flip it to published in the GitHub UI when you're ready for
# end-users to pick up the update. Drafts are invisible to electron-updater
# so the update is "armed" but not yet rolling out.
#
# Tagging recipe:
#   1. Bump `version` in package.json (e.g. 0.1.0 → 0.1.1)
#   2. Commit → `git tag v0.1.1` → `git push --tags`
#   3. This workflow runs, drafts a release with the three installers.
#   4. Review the draft on GitHub → "Publish release" when ready.
on:
  push:
    tags:
      - 'v*'
  # Manual fallback — bypass the tag flow without faking a tag.
  workflow_dispatch:

jobs:
  release:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows pinned to 2022 — see ci.yml for the rationale (win25/*
        # image + Git 2.54 + actions/checkout@v4 token-auth flake). Release
        # builds especially can't afford the flake: a failed leg means no
        # installer for that platform on the draft release.
        os: [ubuntu-latest, windows-2022, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Electron downloads
        # v2.0 round 10 — added macOS cache paths so the mac leg hits
        # cache. See matching note in ci.yml.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Piper TTS binary is gitignored (~22 MB blob we don't want in the
      # repo) so the per-platform binary has to be fetched fresh per CI
      # run. The script picks the right archive for the current runner's
      # OS + arch and extracts into resources/piper/<platform>/piper/,
      # which electron-builder picks up via asarUnpack: resources/**.
      # Without this step, the installer ships voice-disabled — the
      # Voice settings panel shows "Piper binary not bundled" and no
      # streaming TTS works.
      - name: Download Piper binary
        run: npm run piper

      - name: Build
        run: npm run build

      - name: Publish to GitHub Releases
        # `--publish=always` tells electron-builder to upload artifacts to
        # the GitHub Release matching the current tag (creates one if it
        # doesn't exist yet — `releaseType: draft` in electron-builder.yml
        # keeps it hidden until manually flipped to published).
        #
        # GH_TOKEN is the standard auth env var electron-builder reads;
        # GitHub Actions injects the default token automatically and it
        # has the `contents: write` permission below.
        #
        # USE_HARD_LINKS=false — see ci.yml's matching note. electron-builder
        # v25 double-enumerates `resources/**`; macOS + Linux hit EEXIST on
        # the second `link()` while Windows masks the bug via `copyFile`.
        # Forcing copyFile on every platform keeps the release build green
        # until the underlying double-walk is patched upstream.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: 'false'
        run: npx electron-builder --publish=always

    permissions:
      # Required for electron-builder to create/edit the draft release and
      # upload assets via the GitHub API.
      contents: write
