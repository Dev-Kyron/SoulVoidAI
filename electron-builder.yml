appId: dev.kyron.voidsoul
productName: VoidSoul AI Companion
copyright: Copyright (c) 2026 Void Soul Studio

directories:
  buildResources: build
  output: release

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,.prettierrc.json,.editorconfig}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,README.md,LICENSE}'
  # Dev-only tool — Discord MCP is for the studio bootstrapping the
  # community server, not for end users of the installed app. Keep it
  # out of the installer so it doesn't bloat the download.
  - '!tools/discord-mcp/**'
  # v2.0 round 10 — drop ~140 MB of dev-only payload from every
  # installer. Voices/ holds the studio's two reference .onnx voice
  # bundles (Soul/Amy, Void/Arctic) that piper.ts:69 expects under
  # <userData>/voices/<persona>/, not under the asar. eng.traineddata
  # is a Tesseract OCR weights blob used only by a one-off setup
  # script — runtime OCR pulls it on demand into userData. Both were
  # silently shipping into asar via the default `**/*` glob and
  # accounted for the bulk of the v2.0.0 installer bloat (310 MB
  # Windows / 369 MB mac / 396 MB Linux).
  - '!Voices/**'
  - '!eng.traineddata'

# `asarUnpack` places `resources/**` under `app.asar.unpacked/` so the main
# process can spawn native binaries (Piper) and read sidecar dirs (the
# espeak-ng phoneme tables) via real filesystem paths. A previous build
# config also listed `extraResources: resources/**`, which doubled the
# inclusion and inflated installer size — removed.
#
# v2.0 fix — `resources/clickbench/` is read-only seed JSON consumed by
# `benchmarksIo.ts` via `readFileSync` after `app.getAppPath()`. Electron's
# asar shim handles that read transparently inside the archive, so the
# files don't need a second unpacked copy. Mac/Linux's hard-link semantics
# threw EEXIST when the unpack tried to dual-write these files (Windows
# silently overwrote and hid the bug); excluding clickbench from the
# unpack list makes the build pass on every platform.
asarUnpack:
  - resources/**
  - '!resources/clickbench/**'

# v2.0 — bundle the browser-extension's native-messaging host (bridge.cjs
# + install.mjs + manifest template) into the installer so the desktop
# app can register itself with Chrome via Settings → Tools → Browser
# Extension. Path matches `bridgeScriptPath()` in
# src/main/services/extension-bridge/server.ts. The Chrome-extension UI
# itself (tools/browser-extension/extension) is NOT shipped — users load
# it from the public source repo, not from inside the installer.
extraResources:
  - from: tools/browser-extension/native-host
    to: browser-extension/native-host
    filter:
      - '**/*'

# Stable artifact filenames so the marketing site can use the
# /releases/latest/download/<filename> redirect without ever needing
# an update. New version → same filenames → same direct URLs.
win:
  target:
    - target: nsis
      arch:
        - x64
  # Multi-resolution ICO — electron-builder uses this for the installer's
  # NSIS UI, the embedded EXE icon, and the Start Menu / Desktop shortcuts.
  # PNG works for runtime BrowserWindow icons but Windows shortcuts fall
  # back to a generic Electron icon without a real .ico.
  icon: build/icon.ico
  artifactName: VoidSoul-AI-Companion-Setup.${ext}
  # v2.0 round 10 — dropped the per-target `!resources/piper/<other>/**`
  # filters that round 8 added. They were dead config in CI: release.yml
  # runs `npm run piper` (host-only) not `npm run dist`, so the
  # other-platform piper dirs never exist on disk to be excluded.
  # `npm run dist` locally now also runs single-platform via the
  # script change in package.json — see the predist comment there.

nsis:
  # One-click install — no wizard, no per-user/per-machine choice page
  # (which silently 404s the Next button when "all users" needs UAC the
  # user can't grant). Matches modern desktop-app norms: Discord, Slack,
  # Notion, Linear all ship this way. Installs to %LOCALAPPDATA%\Programs.
  oneClick: true
  perMachine: false
  runAfterFinish: true

mac:
  target: dmg
  category: public.app-category.productivity
  icon: build/icon.png
  artifactName: VoidSoul-AI-Companion.${ext}
  # v2.0 round 10 — dead-config piper filters removed (see win: block).

linux:
  target: AppImage
  category: Utility
  icon: build/icon.png
  artifactName: VoidSoul-AI-Companion.${ext}
  # v2.0 round 10 — dead-config piper filters removed (see win: block).

# Auto-update channel. electron-updater reads the same `publish` block at
# runtime to know which `latest.yml` / `latest-mac.yml` / `latest-linux.yml`
# to fetch. Pushing a tagged release (e.g. `v0.1.1`) to the repo causes
# electron-builder to upload artifacts AND the per-platform metadata
# manifests; the running app then sees the new version on its next check.
#
# `releaseType: draft` keeps published releases as drafts until you manually
# flip them to public — gives one last review step before users see them.
publish:
  provider: github
  owner: Dev-Kyron
  repo: SoulVoidAI
  releaseType: draft
