<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VoidSoul</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 14px;
        width: 320px;
        background: #0c0e1f;
        color: #e6e8f5;
        font-size: 13px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
        color: #c4b5fd;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        margin-bottom: 10px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #94a3b8;
        flex-shrink: 0;
      }
      .status[data-connected='true'] .dot {
        background: #34d399;
      }
      .status[data-connected='false'] .dot {
        background: #fb7185;
      }
      .label {
        font-size: 12px;
        color: #cbd0e2;
      }
      .error {
        font-size: 11px;
        color: #fb7185;
        margin-top: 4px;
      }
      .hint {
        font-size: 11px;
        color: #94a3b8;
        line-height: 1.5;
        margin: 8px 0;
      }
      kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
      }
      button {
        cursor: pointer;
        border: none;
        padding: 6px 10px;
        border-radius: 8px;
        font: inherit;
        background: #7c3aed;
        color: white;
        font-weight: 600;
      }
      button:hover {
        background: #6d28d9;
      }
      a {
        color: #c4b5fd;
      }
    </style>
  </head>
  <body>
    <h1>VoidSoul</h1>
    <div id="status" class="status" data-connected="unknown" role="status" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span class="label" id="label">Checking desktop app …</span>
    </div>
    <div id="error" class="error" hidden></div>
    <p class="hint">
      Select text on any page and press <kbd id="hotkey">Alt+Shift+J</kbd> to open the
      Quick AI overlay with that selection as context.
    </p>
    <p class="hint">
      Or right-click selected text and pick <em>Ask VoidSoul about &ldquo;&hellip;&rdquo;</em>.
    </p>
    <div class="actions">
      <button id="open-options" type="button">Open extension options</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
